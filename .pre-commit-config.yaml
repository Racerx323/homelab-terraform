---
minimum_pre_commit_version: "3.6.2"
default_stages: [pre-commit]
exclude: (?:^|/)(?:\.vexp|\.agents)/

repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        entry: shellcheck
        language: system
        types: [shell]

      - id: shfmt
        name: shfmt
        entry: shfmt -d -i 4 -ci
        language: system
        types: [shell]

      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: system
        types: [markdown]
        exclude: >-
          (?:^|/)AGENTS\.md$|^(?:LICENSE\.md|\.github/copilot-instructions\.md)$

      - id: yamllint
        name: yamllint
        entry: yamllint --strict
        language: system
        types: [yaml]

      - id: actionlint
        name: Validate GitHub Actions workflows
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

      - id: check-github-issue-forms
        name: Validate GitHub issue forms
        entry: >-
          check-jsonschema --builtin-schema vendor.github-issue-forms
        language: system
        types: [yaml]
        files: >-
          ^\.github/ISSUE_TEMPLATE/(?!config\.ya?ml$)[^/]+\.ya?ml$

      - id: check-github-issue-config
        name: Validate GitHub issue configuration
        entry: >-
          check-jsonschema --builtin-schema vendor.github-issue-config
        language: system
        types: [yaml]
        files: ^\.github/ISSUE_TEMPLATE/config\.ya?ml$

      - id: check-compose
        name: Validate Compose configuration
        entry: check-jsonschema --builtin-schema vendor.compose-spec
        language: system
        types: [yaml]
        files: >-
          (?:^|/)(?:compose|docker-compose|podman-compose)\.ya?ml$

      - id: check-json
        name: Validate JSON with jq
        entry: jq empty
        language: system
        types: [json]

      - id: trivy-config
        name: Trivy Terraform configuration scan
        entry: >-
          trivy config --skip-check-update --skip-version-check
          --disable-telemetry --exit-code 1 --severity HIGH,CRITICAL .
        language: system
        files: \.tf(?:vars)?(?:\.json)?$
        pass_filenames: false

      - id: gitleaks
        name: Gitleaks
        entry: gitleaks protect --staged --redact --no-banner
        language: system
        pass_filenames: false
        always_run: true
